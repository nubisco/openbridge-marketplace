services:
  db:
    image: postgres:16-alpine
    container_name: openbridge-marketplace-db
    restart: unless-stopped
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: marketplace
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U marketplace']
      interval: 5s
      timeout: 5s
      retries: 10

  marketplace:
    image: ghcr.io/nubisco/openbridge-marketplace:latest
    pull_policy: always
    container_name: openbridge-marketplace
    restart: unless-stopped
    ports:
      - '3050:3000'
    environment:
      DATABASE_URL: postgres://marketplace:${POSTGRES_PASSWORD}@db:5432/marketplace
      JWT_SECRET: ${JWT_SECRET}
      CRAWLER_SCHEDULE: ${CRAWLER_SCHEDULE:-0 */6 * * *}
    depends_on:
      db:
        condition: service_healthy
