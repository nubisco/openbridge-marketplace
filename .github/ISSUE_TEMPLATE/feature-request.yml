name: Feature request
description: Suggest an improvement or new feature
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem and the change you want to see.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve, or what use case does it enable?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you've thought about?

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Links, screenshots, references, or related issues
