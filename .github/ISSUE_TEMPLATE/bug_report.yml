name: Bug report
description: Report a reproducible problem with the marketplace
labels: [bug]
assignees: [joseporto]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail for maintainers to reproduce it.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project is affected?
      options:
        - Marketplace frontend
        - Plugin detail page
        - Search and ranking
        - Reviews and voting
        - API server
        - Crawler / npm sync
        - Authentication
        - Analytics
        - Documentation
        - CI / release
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: 1.6.0 or commit SHA
    validations:
      required: true

  - type: input
    id: runtime
    attributes:
      label: Runtime / environment
      placeholder: Local dev, production, Bun 1.x, browser, OS
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: A minimal code snippet, request example, or repository link that reproduces the issue.
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open ...
        2. Search for ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, logs, response payloads, or related issues
